services:
  - type: web
    name: carexpress-api
    runtime: docker
    rootDir: backend-api
    dockerfilePath: ./Dockerfile
    plan: free
    autoDeploy: true
    healthCheckPath: /up
    envVars:
      - key: APP_NAME
        value: Car Express API
      - key: APP_KEY
        generateValue: true
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_URL
        value: https://carexpress-api.onrender.com
      - key: L5_SWAGGER_CONST_HOST
        value: https://carexpress-api.onrender.com
      - key: PORT
        value: "10000"
      - key: LOG_CHANNEL
        value: stderr
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "5432"
      - key: DB_DATABASE
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_SSLMODE
        value: require
      - key: DATABASE_URL
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        value: https://carexpress-web.onrender.com
      - key: SANCTUM_STATEFUL_DOMAINS
        value: carexpress-web.onrender.com

  - type: static
    name: carexpress-web
    rootDir: carexpress-react
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    pullRequestPreviewsEnabled: false
    envVars:
      - key: VITE_API_BASE_URL
        value: https://carexpress-api.onrender.com
