services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: carexpress-api
    ports:
      - "${APP_PORT:-8000}:8000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: carexpress-postgres
    environment:
      POSTGRES_DB: ${DB_DATABASE:-carexpress}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_DATABASE:-carexpress}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
