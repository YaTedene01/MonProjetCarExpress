services:
  db:
    image: postgres:16-alpine
    container_name: carexpress-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-carexpress}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-carexpress}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend-api
      dockerfile: Dockerfile
    container_name: carexpress-backend
    restart: unless-stopped
    environment:
      APP_NAME: ${APP_NAME:-Car Express API}
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: ${APP_URL:-http://localhost}
      PORT: 8000
      LOG_CHANNEL: stderr
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: ${POSTGRES_DB:-carexpress}
      DB_USERNAME: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      DB_SSLMODE: disable
      L5_SWAGGER_CONST_HOST: ${APP_URL:-http://localhost}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost}
      SANCTUM_STATEFUL_DOMAINS: ${SANCTUM_STATEFUL_DOMAINS:-localhost}
      APP_KEY: ${APP_KEY:-}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./carexpress-react
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
    container_name: carexpress-frontend
    restart: unless-stopped
    depends_on:
      - backend

  gateway:
    image: nginx:stable-alpine
    container_name: carexpress-gateway
    restart: unless-stopped
    ports:
      - "${GATEWAY_PORT:-80}:80"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  postgres_data:
